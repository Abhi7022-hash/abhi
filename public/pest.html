<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pest Detection - KRISHI SIRI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">KRISHI SIRI</a>
            <a href="index.html" class="btn btn-outline-light btn-sm" id="back-btn">Back</a>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm p-4">
                    <h2 class="text-center mb-4 text-success fw-bold" id="page-title">Pest & Disease Detection</h2>
                    <div class="text-center mb-4">
                        <div class="upload-area border border-2 border-dashed rounded p-5 bg-white" id="drop-area">
                            <i class="lucide-image fs-1 text-muted mb-3"></i>
                            <p id="upload-text">Drag & Drop or Click to Upload Leaf Image</p>
                            <input type="file" id="file-input" class="d-none" accept="image/*">
                            <button class="btn btn-outline-success" onclick="document.getElementById('file-input').click()" id="browse-btn">Browse File</button>
                        </div>
                        <div id="preview-container" class="mt-3 d-none">
                            <img id="image-preview" class="img-fluid rounded shadow-sm" style="max-height: 300px;">
                        </div>
                    </div>
                    <div class="text-center">
                        <button id="detect-btn" class="btn btn-success btn-lg px-5 d-none">Detect Pest</button>
                    </div>
                    <div id="pest-result" class="mt-4 d-none">
                        <div class="alert alert-info">
                            <h4 class="alert-heading" id="res-heading">Detection Result:</h4>
                            <p><strong>Pest/Disease:</strong> <span id="pest-name"></span></p>
                            <p><strong>Treatment:</strong> <span id="pest-treatment"></span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
