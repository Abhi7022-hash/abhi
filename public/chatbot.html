<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Chatbot - KRISHI SIRI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">KRISHI SIRI</a>
            <a href="index.html" class="btn btn-outline-light btn-sm" id="back-btn">Back</a>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm overflow-hidden" style="height: 600px;">
                    <div class="card-header bg-white border-bottom py-3">
                        <h5 class="mb-0 fw-bold text-success" id="page-title">Farmer AI Chatbot</h5>
                    </div>
                    <div class="card-body bg-light p-4 overflow-auto" id="chat-box">
                        <div class="chat-message bot-message mb-3">
                            <div class="message-content p-3 rounded shadow-sm bg-white">
                                Hello! I am your Krishi Siri assistant. How can I help you today?
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-top p-3">
                        <form id="chat-form" class="d-flex gap-2">
                            <input type="text" id="chat-input" class="form-control" placeholder="Type your question here...">
                            <button type="submit" class="btn btn-success px-4" id="send-btn">Send</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
